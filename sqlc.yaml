version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/storage/sqlite/queries"
    schema: "internal/storage/sqlite/migrations"
    gen:
      go:
        package: "gen"
        out: "internal/storage/gen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_pointers_for_null_types: true
